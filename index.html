<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福林64訂購系統</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon0702.png">
<link rel="icon" type="image/png" sizes="180x180" href="icons/apple-touch-icon0702.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --bg: #F6F9FB;
    --surface: #FFFFFF;
    --surface2: #EEF3F7;
    --border: #DCE7EF;
    --accent: #6E93B5;
    --accent-light: #A3C0DA;
    --accent-pale: #E9F1F7;
    --text: #3C4751;
    --text-muted: #7C8A97;
    --green: #6BA989;
    --green-pale: #EAF5EF;
    --red: #D49494;
    --red-pale: #FBEEEE;
    --shadow: 0 2px 10px rgba(60, 71, 81, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: #FFF;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(60,71,81,0.10);
  }
  header h1 {
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 span { font-size: 1.4rem; }
  .mode-badge {
    font-size: 0.72rem;
    background: rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 500;
  }

  /* ── Nav tabs ── */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }
  nav button {
    flex: 1;
    min-width: 80px;
    padding: 12px 6px;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: inherit;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .15s;
    white-space: nowrap;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Page containers ── */
  .page { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  /* ── Date selector ── */
  .date-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .date-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--surface);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .15s;
  }
  .date-btn:hover { border-color: var(--accent-light); color: var(--accent); }
  .date-btn.active { background: var(--accent); border-color: var(--accent); color: #FFF; }
  .date-btn.notopen {
    background: var(--surface);
    border-color: var(--accent-light);
    color: var(--accent-light);
  }
  .date-btn.notopen:hover { border-color: var(--accent); color: var(--accent); }
  .date-btn.notopen.active { background: var(--accent); border-color: var(--accent); color: #FFF; }

  .date-btn.expired {
    background: #F1F3F5;
    border-color: #E3E7EA;
    color: #B7C0C8;
  }
  .date-btn.expired:hover { border-color: var(--accent-light); color: var(--accent); }
  .date-btn.expired.active { background: var(--accent); border-color: var(--accent); color: #FFF; }

  .date-btn.past {
    background: #F1F3F5;
    border-color: #E3E7EA;
    color: #B7C0C8;
    cursor: not-allowed;
  }
  .date-btn.past:hover { border-color: #E3E7EA; color: #B7C0C8; }
  .date-btn.past.active { background: #C7CDD2; border-color: #C7CDD2; color: #FFF; }

  /* ── Student selector ── */
  .student-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
  }
  .student-btn {
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .student-btn:hover { border-color: var(--accent-light); }
  .student-btn.active { background: var(--accent-pale); border-color: var(--accent); color: var(--accent); }
  .student-btn.ordered { position: relative; }
  .student-btn.ordered::after {
    content: '✓';
    position: absolute;
    top: 3px; right: 5px;
    font-size: 0.7rem;
    color: var(--green);
  }

  /* ── Menu items ── */
  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item-info { flex: 1; }
  .menu-item-name { font-weight: 700; font-size: 0.95rem; }
  .menu-item-price { font-size: 0.82rem; color: var(--accent); font-weight: 500; margin-top: 2px; }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    font-family: inherit;
  }
  .qty-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .qty-num {
    min-width: 24px;
    text-align: center;
    font-weight: 900;
    font-size: 1.05rem;
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #FFF; }
  .btn-primary:hover:not(:disabled) { background: #3D6C96; }
  .btn-secondary { background: var(--surface2); color: var(--accent); border: 2px solid var(--accent-light); }
  .btn-danger { background: var(--red-pale); color: var(--red); border: 2px solid #ECA5A5; }
  .btn-success { background: var(--green-pale); color: var(--green); border: 2px solid #A1D3B6; }
  .btn + .btn { margin-top: 8px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Admin menu editor ── */
  .menu-edit-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .menu-edit-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    background: var(--surface);
  }
  .menu-edit-row input:focus { outline: none; border-color: var(--accent); }
  .menu-edit-row input.price { width: 80px; flex: none; }
  .del-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: none;
    background: var(--red-pale);
    color: var(--red);
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Stats table ── */
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .stats-table th {
    background: var(--accent-pale);
    color: var(--accent);
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    border-bottom: 2px solid var(--accent-light);
  }
  .stats-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .stats-table tr:last-child td { border-bottom: none; }
  .stats-table tr:hover td { background: var(--accent-pale); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .badge-green { background: var(--green-pale); color: var(--green); }
  .badge-blue { background: var(--accent-pale); color: var(--accent); }
  .badge-gray { background: #F1F4F7; color: var(--text-muted); border: 1px solid #D9E1E8; }
  .badge-red { background: var(--red-pale); color: var(--red); border: 1px solid #F5C6C6; }

  /* Payment Status Select */
  .status-select {
    padding: 4px;
    font-size: 0.8rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 0;
    width: 100%;
    background: var(--surface);
    font-family: inherit;
    color: var(--text);
  }
  .status-select.paid { background: var(--green-pale); color: var(--green); border-color: var(--green); font-weight: 700; }
  .status-select.canceled { background: var(--red-pale); color: var(--red); border-color: var(--red); font-weight: 700; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: #FFF;
    padding: 10px 22px;
    border-radius: 22px;
    font-size: 0.9rem;
    font-weight: 700;
    transition: transform .25s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 8px; }

  /* ── Summary bar ── */
  .summary-bar {
    background: var(--accent-pale);
    border: 1px solid var(--accent-light);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-bar .label { font-size: 0.82rem; color: var(--text-muted); }
  .summary-bar .value { font-size: 1.1rem; font-weight: 900; color: var(--accent); }

  /* ── Admin section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-header h3 { font-size: 0.95rem; font-weight: 700; }

  label.field-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  input[type="date"], input[type="datetime-local"], input[type="text"], input[type="number"], input[type="password"] {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--surface);
    width: 100%;
    margin-bottom: 12px;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field-row > div { flex: 1; min-width: 120px; }

  select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--surface);
    width: 100%;
    margin-bottom: 12px;
    color: var(--text);
  }

  .stats-tab-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 7px;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-muted);
    transition: all .15s;
  }
  .stats-tab-btn.active {
    background: var(--accent);
    color: #FFF;
  }

  /* ── Export CSV button area ── */
  .export-area {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .export-area .btn { flex: 1; min-width: 120px; }
  
  /* 操作紀錄滾動區 */
  .log-container {
    max-height: 250px;
    overflow-y: auto;
    font-size: 0.85rem;
    background: var(--surface2);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .log-item {
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    display: flex;
    gap: 10px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time { color: var(--text-muted); min-width: 110px; flex-shrink: 0; }
  .log-user { color: var(--accent); font-weight: bold; flex-shrink: 0; }
  .log-action { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1><span>🍱</span> 福林64餐點訂購系統</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="last-sync" style="font-size:0.66rem;opacity:0.85;white-space:nowrap;"></span>
    <span class="mode-badge" id="mode-badge">家長訂餐</span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('order')">📋 訂餐</button>
  <button onclick="switchTab('stats')">📊 統計</button>
  <button onclick="switchTab('admin')" id="admin-tab-btn">⚙️ 後台</button>
</nav>

<!-- ── 訂餐頁 ── -->
<div class="page active" id="page-order">
  <img src="https://i.ibb.co/YFRss0PM/bn.jpg" alt="首頁橫幅" style="width:100%; border-radius:12px; margin-bottom:16px; box-shadow: var(--shadow); display:block;">

  <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
    <button class="btn btn-secondary" style="width:auto;padding:6px 14px;font-size:0.8rem" onclick="manualRefresh()">🔄 重新整理最新資料</button>
  </div>

  <div class="card">
    <div class="card-title">選擇日期</div>
    <div class="date-grid" id="date-grid"></div>
    <div style="margin-top:10px; display:flex; gap:14px; font-size:0.78rem; color:var(--text-muted); align-items:center; flex-wrap:wrap;">
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:inline-block;"></span>可訂購</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--accent-light);display:inline-block;"></span>🕒 尚未開放</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:50%;background:#F1F3F5;border:2px solid #E3E7EA;display:inline-block;"></span>已截止訂購</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:50%;background:#F1F3F5;border:2px solid #E3E7EA;display:inline-block;"></span>🔒 已過日期</span>
    </div>
  </div>

  <div class="card" id="student-card" style="display:none">
    <div class="card-title">選擇學生</div>
    <div class="student-grid" id="student-grid"></div>
  </div>

  <div class="card" id="menu-card" style="display:none">
    <div class="card-title">今日菜單 — <span id="current-date-label"></span></div>
    <div id="menu-items"></div>
  </div>

  <div id="order-actions" style="display:none">
    <button class="btn btn-primary" onclick="saveOrder()">✅ 儲存訂單</button>
    <button class="btn btn-danger" onclick="clearOrder()">🗑 清除此筆訂單</button>
  </div>
</div>

<!-- ── 統計頁 ── -->
<div class="page" id="page-stats">
  <div style="display:flex;gap:6px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px">
    <button class="stats-tab-btn active" id="stab-daily"    onclick="switchStatsTab('daily')">📋 每日訂單</button>
    <button class="stats-tab-btn"        id="stab-items"    onclick="switchStatsTab('items')">🍱 品項統計</button>
    <button class="stats-tab-btn"        id="stab-billing"  onclick="switchStatsTab('billing')">💰 區間帳單</button>
  </div>

  <div id="filter-daily">
    <div class="card" style="margin-bottom:10px">
      <div class="field-row" style="align-items:flex-end">
        <div>
          <label class="field-label">選擇日期</label>
          <input type="date" id="filter-date" style="margin-bottom:0" onchange="renderStats()">
        </div>
        <div>
          <label class="field-label">學生</label>
          <select id="stats-student" style="margin-bottom:0" onchange="renderStats()">
            <option value="">全部</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="filter-items" style="display:none">
    <div class="card" style="margin-bottom:10px">
      <div class="field-row" style="align-items:flex-end">
        <div>
          <label class="field-label">起始日期</label>
          <input type="date" id="filter-from" style="margin-bottom:0" onchange="renderStats()">
        </div>
        <div>
          <label class="field-label">結束日期</label>
          <input type="date" id="filter-to" style="margin-bottom:0" onchange="renderStats()">
        </div>
      </div>
    </div>
  </div>

  <div id="filter-billing" style="display:none">
    <div class="card" style="margin-bottom:10px">
      <div class="field-row" style="align-items:flex-end">
        <div>
          <label class="field-label">起始日期</label>
          <input type="date" id="billing-from" style="margin-bottom:0" onchange="renderStats()">
        </div>
        <div>
          <label class="field-label">結束日期</label>
          <input type="date" id="billing-to" style="margin-bottom:0" onchange="renderStats()">
        </div>
        <div>
          <label class="field-label">學生</label>
          <select id="billing-student" style="margin-bottom:0" onchange="renderStats()">
            <option value="">全部</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div id="stats-content"></div>

  <div class="card">
    <div class="card-title">匯出資料</div>
    <div class="export-area">
      <button class="btn btn-secondary" onclick="exportCSV()">📥 匯出 CSV</button>
      <button class="btn btn-secondary" onclick="exportJSON()">📦 備份 JSON</button>
    </div>
  </div>
</div>

<!-- ── 後台頁 ── -->
<div class="page" id="page-admin">
  <div id="admin-locked">
    <div class="card">
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:2.5rem;margin-bottom:8px">🔒</div>
        <div style="font-size:1rem;font-weight:700;margin-bottom:16px">後台管理區</div>
        <input type="password" id="admin-pw-input" placeholder="輸入密碼" style="max-width:240px;display:block;margin:0 auto 12px">
        <button class="btn btn-primary" style="max-width:240px;margin:0 auto" onclick="unlockAdmin()">進入後台</button>
        <div id="pw-error" style="color:var(--red);font-size:0.82rem;margin-top:8px"></div>
      </div>
    </div>
  </div>

  <div id="admin-unlocked" style="display:none">

    <!-- 更改密碼 -->
    <div class="card">
      <div class="section-header">
        <h3>🔑 修改後台密碼</h3>
      </div>
      <label class="field-label">新密碼</label>
      <input type="password" id="new-pw" placeholder="輸入新密碼">
      <button class="btn btn-secondary" onclick="changePassword()">更新密碼</button>
    </div>

    <!-- 學生名單 -->
    <div class="card">
      <div class="section-header">
        <h3>👦 學生名單</h3>
      </div>
      <div id="student-list-edit"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input type="text" id="new-student" placeholder="新增學生姓名" style="margin:0">
        <button class="btn btn-secondary" style="width:auto;padding:9px 16px" onclick="addStudent()">＋</button>
      </div>
    </div>

    <!-- 每日菜單設定 -->
    <div class="card">
      <div class="section-header">
        <h3>🍱 設定每日菜單與期限</h3>
      </div>
      <label class="field-label">選擇日期</label>
      <input type="date" id="admin-date">

      <label class="field-label" style="margin-top:8px">開放訂購時間 (留空表示立即開放)</label>
      <div class="field-row" style="margin-bottom:12px">
        <div><input type="date" id="admin-open-date" style="margin-bottom:0"></div>
        <div>
          <select id="admin-open-hour" style="margin-bottom:0">
            <option value="">不限制</option>
          </select>
        </div>
      </div>

        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:10px;">學生名單與菜單設定不會受影響，但訂單一旦清除無法復原。請在下方輸入「<b>清除訂單</b>」以確認：</div>
        <input type="text" id="clear-confirm-input" placeholder="請輸入：清除訂單" oninput="checkClearConfirmInput()">

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  DATA LAYER
// ════════════════════════════════════════
const BIN_ID  = '6a3c9dd1da38895dfefaee07';
const API_KEY = '$2a$10$3LFcgs7M2mWRFdUXt21Qm.2xnERxm.GU34dGLDAgh4Sy7gVKdoauO';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const JSONBIN_HEADERS = { 'X-Access-Key': API_KEY };

let _cache = null;
const STATUS_LABEL = { unpaid: '待付款', paid: '已付款', canceled: '取消' };

function defaultData() {
  return { password: 'admin1234', students: [], menus: {}, orders: {}, deadlines: {}, opens: {}, payments: {}, logs: [] };
}

function normalizeData(raw) {
  const data = (raw && typeof raw === 'object') ? raw : {};
  const base = defaultData();

  data.password = data.password || base.password;
  data.students = Array.isArray(data.students) ? data.students : [];
  data.menus = (data.menus && typeof data.menus === 'object') ? data.menus : {};
  data.orders = (data.orders && typeof data.orders === 'object') ? data.orders : {};
  data.deadlines = (data.deadlines && typeof data.deadlines === 'object') ? data.deadlines : {};
  data.opens = (data.opens && typeof data.opens === 'object') ? data.opens : {};
  data.payments = (data.payments && typeof data.payments === 'object') ? data.payments : {};
  data.logs = Array.isArray(data.logs) ? data.logs : [];

  return data;
}

function showLoading(msg = '載入中…') {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = `position:fixed;inset:0;background:rgba(245,248,250,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Noto Sans TC',sans-serif;gap:12px;`;
    el.innerHTML = `<div style="font-size:2rem">🍱</div><div id="loading-msg" style="font-weight:700;color:#5084B2;font-size:1rem"></div>`;
    document.body.appendChild(el);
  }
  document.getElementById('loading-msg').textContent = msg;
  el.style.display = 'flex';
}
function hideLoading() { const el = document.getElementById('loading-overlay'); if (el) el.style.display = 'none'; }

async function requestJsonBin(url, options = {}, actionName = 'JSONBin') {
  const res = await fetch(url, { ...options, cache: 'no-store' });
  const text = await res.text();
  let payload = null;
  try { payload = text ? JSON.parse(text) : null; } catch (e) { payload = { raw: text }; }

  if (!res.ok) {
    const detail = payload && (payload.message || payload.error || payload.raw || JSON.stringify(payload));
    throw new Error(`${actionName}失敗，HTTP ${res.status}${detail ? '：' + String(detail).slice(0, 160) : ''}`);
  }
  return payload;
}

async function fetchLatestData() {
  const json = await requestJsonBin(
    BIN_URL + '/latest',
    { headers: JSONBIN_HEADERS },
    '讀取雲端資料'
  );
  if (!json || !json.record || typeof json.record !== 'object') {
    throw new Error('JSONBin 回傳格式異常，找不到 record 欄位');
  }
  return normalizeData(json.record);
}

async function writeLatestData(data) {
  return await requestJsonBin(
    BIN_URL,
    {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        ...JSONBIN_HEADERS
      },
      body: JSON.stringify(normalizeData(data))
    },
    '寫入雲端資料'
  );
}

let _cacheTime = 0;
const CACHE_TTL_MS = 5000; // 快取只有 5 秒有效，避免分頁開很久卻一直顯示舊資料

async function getData(forceRefresh = false) {
  const isFresh = _cache && (Date.now() - _cacheTime) < CACHE_TTL_MS;
  if (isFresh && !forceRefresh) return _cache;
  showLoading('讀取資料中…');
  try {
    _cache = await fetchLatestData();
    _cacheTime = Date.now();
    updateLastSyncLabel();
  } catch (e) {
    console.error('getData failed:', e);
    showToast('❌ 讀取雲端失敗，已使用本機暫存資料');
    _cache = normalizeData(_cache || defaultData());
  } finally {
    hideLoading();
  }
  return _cache;
}

function updateLastSyncLabel() {
  const el = document.getElementById('last-sync');
  if (!el) return;
  const d = new Date();
  el.textContent = `🔄 已同步 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// 分頁從背景切回前景時，強制重新抓一次最新資料，降低看到過期畫面的機率
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  getData(true).then(async () => {
    const activePage = document.querySelector('.page.active');
    if (!activePage) return;
    if (activePage.id === 'page-order') {
      await renderDateGrid();
      if (state.selectedStudent) await renderMenuItems();
      else if (state.selectedDate) await renderStudentGrid();
    } else if (activePage.id === 'page-stats') {
      await renderStats();
    } else if (activePage.id === 'page-admin' && state.adminUnlocked) {
      await renderAdminPage();
    }
  });
});

async function manualRefresh() {
  await getData(true);
  await renderDateGrid();
  if (state.selectedDate) await renderStudentGrid();
  if (state.selectedStudent) await renderMenuItems();
  showToast('✅ 已更新為最新資料');
}

function getLogTimeStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function pushLog(latestData, user, action) {
  if (!latestData.logs) latestData.logs = [];
  latestData.logs.unshift({ time: getLogTimeStr(), user, action });
  if (latestData.logs.length > 50) latestData.logs.pop(); 
}

async function mutateData(modifierCallback) {
  showLoading('同步最新資料並儲存中…');
  try {
    const latestData = await fetchLatestData();
    // modifierCallback 若明確回傳 false，代表「內容其實沒有變化，不需要寫入」
    // （例如新增重複的學生姓名），此時直接跳過寫入，避免白白多產生一筆雲端版本紀錄。
    const result = await modifierCallback(latestData);
    if (result === false) {
      hideLoading();
      return false;
    }
    normalizeData(latestData);
    await writeLatestData(latestData);
    _cache = latestData;
    _cacheTime = Date.now();
    updateLastSyncLabel();
  } catch (e) {
    console.error('mutateData/save failed:', e);
    const msg = e && e.message ? e.message : '請重試或檢查網路';
    showToast('❌ 儲存失敗：' + msg.slice(0, 90));
    return false;
  } finally {
    hideLoading();
  }
  return true;
}

async function autoBackup(actionName) {
  showToast(`正在下載${actionName}前備份...`);
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: JSONBIN_HEADERS });
    const json = await res.json();
    downloadFile(`福林64_${actionName}前自動備份_${getPreciseTimeStr()}.json`, JSON.stringify(json.record, null, 2), 'application/json');
  } catch (e) {
    console.error("備份失敗", e);
    showToast('❌ 自動備份失敗，請確認網路連線');
    throw e;
  }
}

// ════════════════════════════════════════
//  核心邏輯
// ════════════════════════════════════════
let state = { selectedDate: null, selectedStudent: null, currentOrder: {}, adminUnlocked: false };

async function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`nav button[onclick="switchTab('${tab}')"]`).classList.add('active');
  if (tab === 'order') renderDateGrid();
  if (tab === 'stats') { await initStatsDefaults(); currentStatsTab = 'daily'; switchStatsTab('daily'); }
  if (tab === 'admin') renderAdminPage();
}

async function renderDateGrid() {
  const data = await getData();
  const grid = document.getElementById('date-grid');
  grid.innerHTML = '';
  
  const menuDates = Object.keys(data.menus || {});
  const orderDates = Object.keys(data.orders || {});
  const allDatesSet = new Set([...menuDates, ...orderDates]);
  const dates = Array.from(allDatesSet).sort();

  const weekDays = ['日','一','二','三','四','五','六'];
  const now = new Date();
  const today = todayStr();
  
  dates.forEach(key => {
    const hasOrders = data.orders && data.orders[key] && Object.keys(data.orders[key]).length > 0;
    const hasMenu = data.menus[key] && data.menus[key].length > 0;

    // 如果沒有菜單，且該日期的所有訂單也被清空了，就不再顯示這個日期按鈕
    if (!hasMenu && !hasOrders) return;

    const [y, m, d] = key.split('-');
    const dateObj = new Date(key + 'T00:00:00');
    const deadlineStr = (data.deadlines || {})[key];
    const openStr = (data.opens || {})[key];
    const isDeadlineExpired = !!(deadlineStr && now > new Date(deadlineStr));
    const isNotYetOpen = !!(openStr && now < new Date(openStr));
    const isPastDate = key < today;
    const isLocked = isPastDate && !state.adminUnlocked;

    const btn = document.createElement('button');
    let cls = 'date-btn';
    if (state.selectedDate === key) cls += ' active';
    if (isPastDate) cls += ' past';
    else if (isDeadlineExpired) cls += ' expired';
    else if (isNotYetOpen) cls += ' notopen';

    btn.className = cls;
    let labelText = `${parseInt(m)}/${parseInt(d)}(${weekDays[dateObj.getDay()]})`;
    if (isPastDate) labelText += ' 🔒';
    else if (isNotYetOpen) labelText += ' 🕒';
    
    btn.textContent = labelText;
    
    if (isLocked) {
      btn.disabled = true;
    } else {
      btn.onclick = () => selectDate(key);
    }
    grid.appendChild(btn);
  });
}

async function selectDate(dateKey) {
  state.selectedDate = dateKey;
  state.selectedStudent = null;
  state.currentOrder = {};
  await renderDateGrid();
  await renderStudentGrid();
  document.getElementById('student-card').style.display = 'block';
  document.getElementById('menu-card').style.display = 'none';
  document.getElementById('order-actions').style.display = 'none';
}

async function renderStudentGrid() {
  const data = await getData();
  const grid = document.getElementById('student-grid');
  grid.innerHTML = '';
  data.students.forEach(s => {
    const btn = document.createElement('button');
    const hasOrder = data.orders[state.selectedDate] && data.orders[state.selectedDate][s];
    btn.className = 'student-btn' + (state.selectedStudent === s ? ' active' : '') + (hasOrder ? ' ordered' : '');
    btn.textContent = s;
    btn.onclick = () => selectStudent(s);
    grid.appendChild(btn);
  });
}

async function selectStudent(name) {
  state.selectedStudent = name;
  const data = await getData();
  const existing = data.orders[state.selectedDate] && data.orders[state.selectedDate][name];
  state.currentOrder = existing ? existing.reduce((acc, i) => ({...acc, [i.name]: i.qty}), {}) : {};
  await renderStudentGrid();
  await renderMenuItems();
  document.getElementById('menu-card').style.display = 'block';
  const [, m, d] = state.selectedDate.split('-');
  document.getElementById('current-date-label').textContent = `${parseInt(m)}月${parseInt(d)}日`;
}

async function renderMenuItems() {
  const data = await getData();
  const menu = data.menus[state.selectedDate] || [];
  const container = document.getElementById('menu-items');
  const actionsContainer = document.getElementById('order-actions');
  container.innerHTML = '';
  
  if (menu.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem; padding:10px 0;">💡 提示：此日期的菜單已清空。若臨時決定不訂餐，請選擇有訂餐的學生並按下「🗑 清除此筆訂單」。當日所有訂單清空後，此日期會自動隱藏。</div>';
  }

  const deadlineStr = (data.deadlines || {})[state.selectedDate];
  const openStr = (data.opens || {})[state.selectedDate];
  const now = new Date();
  const isPastDeadline = deadlineStr && now > new Date(deadlineStr);
  const isBeforeOpen = openStr && now < new Date(openStr);

  menu.forEach(item => {
    const qty = state.currentOrder[item.name] || 0;
    const row = document.createElement('div');
    row.className = 'menu-item';
    row.innerHTML = `
      <div class="menu-item-info">
        <div class="menu-item-name">${escapeHtml(item.name)}</div>
        <div class="menu-item-price">NT$${item.price}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${escapeAttr(item.name)}', -1)" ${(isPastDeadline || isBeforeOpen) && !state.adminUnlocked ? 'disabled' : ''}>－</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${escapeAttr(item.name)}', 1)" ${(isPastDeadline || isBeforeOpen) && !state.adminUnlocked ? 'disabled' : ''}>＋</button>
      </div>`;
    container.appendChild(row);
  });

  if (isBeforeOpen && !state.adminUnlocked) {
    const openDate = new Date(openStr);
    const openLabel = `${openDate.getMonth()+1}/${openDate.getDate()} ${String(openDate.getHours()).padStart(2,'0')}:00`;
    actionsContainer.innerHTML = `<div style="text-align:center;color:var(--accent);font-weight:bold;padding:10px;">🕒 尚未開放訂購，將於 ${openLabel} 開放。</div>`;
  } else if (isPastDeadline && !state.adminUnlocked) {
    actionsContainer.innerHTML = '<div style="text-align:center;color:var(--red);font-weight:bold;padding:10px;">⏳ 已過期，無法修改。</div>';
  } else {
    const hasExistingOrder = data.orders[state.selectedDate] && data.orders[state.selectedDate][state.selectedStudent];
    let buttonsHtml = '';
    
    if (menu.length > 0) {
      buttonsHtml += `<button class="btn btn-primary" onclick="saveOrder()">✅ 儲存訂單</button>`;
    }
    
    if (hasExistingOrder || Object.keys(state.currentOrder).length > 0) {
      buttonsHtml += `<button class="btn btn-danger" onclick="clearOrder()">🗑 清除此筆訂單</button>`;
    }
    
    actionsContainer.innerHTML = buttonsHtml;
  }
  
  if (actionsContainer.innerHTML.trim() !== '') {
    actionsContainer.style.display = 'block';
  } else {
    actionsContainer.style.display = 'none';
  }
}

function changeQty(name, delta) {
  const next = Math.max(0, (state.currentOrder[name] || 0) + delta);
  state.currentOrder[name] = next;
  renderMenuItems();
}

async function saveOrder() {
  // 使用者畫面上目前勾選的品項與數量（名稱→數量），實際會用哪個品項/價格
  // 要等 mutateData 抓到最新菜單後才能決定，避免用到過期的價格或已下架的品項。
  const selectedQtyByName = { ...state.currentOrder };

  const success = await mutateData((latest) => {
    // 一定要用剛從雲端抓下來的最新菜單，而不是外部可能過期的 _cache，
    // 避免管理員同時改了價格/品項時，訂單記錄到舊資料。
    const menuItems = latest.menus[state.selectedDate] || [];
    const order = menuItems
      .filter(i => (selectedQtyByName[i.name] || 0) > 0)
      .map(i => ({ name: i.name, price: i.price, qty: selectedQtyByName[i.name] }));

    if (!latest.orders[state.selectedDate]) latest.orders[state.selectedDate] = {};

    let actionText = '';

    // 如果訂單內容為空，代表執行清除
    if (order.length === 0) {
      delete latest.orders[state.selectedDate][state.selectedStudent];
      
      // 若當天已無任何訂單，順便把當天日期從 orders 中移除，保持資料庫乾淨
      if (Object.keys(latest.orders[state.selectedDate]).length === 0) {
        delete latest.orders[state.selectedDate];
      }
      actionText = `清除訂單 (${state.selectedDate} - ${state.selectedStudent})`;
    } else {
      latest.orders[state.selectedDate][state.selectedStudent] = order;
      actionText = `送出/修改訂單 (${state.selectedDate} - ${state.selectedStudent})`;
    }

    // 加入訪客與家長操作紀錄
    const userRole = state.adminUnlocked ? '管理員' : '家長/訪客';
    pushLog(latest, userRole, actionText);
  });

  if (success) {
    await renderStudentGrid();
    await renderDateGrid();
    await renderMenuItems();
    showToast('✅ 訂單已更新');
  }
}

async function clearOrder() { 
  if (!confirm('確定要清除這位學生的此筆訂單嗎？')) return;
  state.currentOrder = {}; 
  // 直接呼叫儲存程序，不僅清除訂單，也會順便寫入一筆新紀錄來確保雲端成功更新
  await saveOrder(); 
}

// ════════════════════════════════════════
//  小工具
// ════════════════════════════════════════
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function populateHourSelects() {
  ['admin-open-hour', 'admin-deadline-hour'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel || sel.dataset.filled) return;
    for (let h = 0; h < 24; h++) {
      const opt = document.createElement('option');
      opt.value = String(h).padStart(2, '0');
      opt.textContent = `${String(h).padStart(2, '0')} 時`;
      sel.appendChild(opt);
    }
    sel.dataset.filled = '1';
  });
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getPreciseTimeStr() {
  const d = new Date();
  return `${todayStr()}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
}

function csvCell(v) {
  const s = String(v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ════════════════════════════════════════
//  統計頁：每日訂單／品項統計／區間帳單
// ════════════════════════════════════════
let currentStatsTab = 'daily';

function switchStatsTab(tab) {
  if (tab === 'items' && !state.adminUnlocked) return;
  currentStatsTab = tab;
  ['daily','items','billing'].forEach(t => {
    document.getElementById('stab-' + t).classList.toggle('active', t === tab);
    document.getElementById('filter-' + t).style.display = t === tab ? '' : 'none';
  });
  renderStats();
}

function updateItemsTabVisibility() {
  const btn = document.getElementById('stab-items');
  if (btn) btn.style.display = state.adminUnlocked ? '' : 'none';
}

async function initStatsDefaults() {
  const data = await getData();
  const dates = Object.keys(data.menus || {}).sort();
  const today = todayStr();
  const defaultDate = dates.find(d => d >= today) || dates[dates.length-1] || today;
  const filterDate = document.getElementById('filter-date');
  if (filterDate && !filterDate.value) filterDate.value = defaultDate;
}

function populateStudentSelects(data) {
  ['stats-student', 'billing-student'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">全部</option>' +
      (data.students || []).map(s => `<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`).join('');
    if ((data.students || []).includes(current)) sel.value = current;
  });
}

async function renderStats() {
  const data = await getData();
  populateStudentSelects(data);
  updateItemsTabVisibility();

  if (currentStatsTab === 'items' && !state.adminUnlocked) {
    currentStatsTab = 'daily';
    ['daily','items','billing'].forEach(t => {
      document.getElementById('stab-' + t).classList.toggle('active', t === 'daily');
      document.getElementById('filter-' + t).style.display = t === 'daily' ? '' : 'none';
    });
  }

  const weekDays = ['日','一','二','三','四','五','六'];
  const container = document.getElementById('stats-content');
  container.innerHTML = '';

  if (currentStatsTab === 'daily') renderDailyStats(data, weekDays, container);
  else if (currentStatsTab === 'items') renderItemsStats(data, container);
  else if (currentStatsTab === 'billing') renderBillingStats(data, container);
}

function renderDailyStats(data, weekDays, container) {
  const date = document.getElementById('filter-date').value;
  const studentFilter = document.getElementById('stats-student').value;
  if (!date) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div>請選擇日期查看當天訂單。</div>';
    return;
  }
  const dayOrders = (data.orders || {})[date] || {};
  const entries = Object.entries(dayOrders).filter(([s]) => !studentFilter || s === studentFilter);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📭</div>這天還沒有任何訂單。</div>';
    return;
  }

  const itemAgg = {};
  let dayTotal = 0;
  entries.forEach(([, items]) => {
    items.forEach(it => {
      if (!itemAgg[it.name]) itemAgg[it.name] = { qty: 0 };
      itemAgg[it.name].qty += it.qty;
      dayTotal += it.price * it.qty;
    });
  });

  let html = `<div class="summary-bar"><span class="label">當日總額</span><span class="value">NT$${dayTotal}</span></div>`;
  html += `<div class="card"><div class="card-title">品項加總（出餐核對用）</div><table class="stats-table"><thead><tr><th>品項</th><th>數量</th></tr></thead><tbody>`;
  Object.entries(itemAgg).forEach(([name, info]) => {
    html += `<tr><td>${escapeHtml(name)}</td><td>${info.qty}</td></tr>`;
  });
  html += `</tbody></table></div>`;

  html += `<div class="card"><div class="card-title">每位學生明細</div><table class="stats-table"><thead><tr><th>學生</th><th>品項</th><th>小計</th></tr></thead><tbody>`;
  entries.forEach(([student, items]) => {
    const subtotal = items.reduce((acc,i) => acc + i.price*i.qty, 0);
    html += `<tr><td>${escapeHtml(student)}</td><td>${items.map(i=>escapeHtml(i.name)+'×'+i.qty).join('、')}</td><td>NT$${subtotal}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

function renderItemsStats(data, container) {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const itemAgg = {};
  let grandTotal = 0;
  Object.keys(data.orders || {}).forEach(date => {
    if ((from && date < from) || (to && date > to)) return;
    Object.values(data.orders[date]).forEach(items => {
      items.forEach(it => {
        if (!itemAgg[it.name]) itemAgg[it.name] = { qty: 0, total: 0 };
        itemAgg[it.name].qty += it.qty;
        itemAgg[it.name].total += it.price * it.qty;
        grandTotal += it.price * it.qty;
      });
    });
  });
  const names = Object.keys(itemAgg);
  if (names.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">🍱</div>這個區間內沒有任何訂單。</div>';
    return;
  }
  let html = `<div class="summary-bar"><span class="label">區間總營業額</span><span class="value">NT$${grandTotal}</span></div>`;
  html += `<div class="card"><table class="stats-table"><thead><tr><th>品項</th><th>數量</th><th>小計</th></tr></thead><tbody>`;
  names.forEach(name => {
    const a = itemAgg[name];
    html += `<tr><td>${escapeHtml(name)}</td><td>${a.qty}</td><td>NT$${a.total}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

function renderBillingStats(data, container) {
  const from = document.getElementById('billing-from').value;
  const to = document.getElementById('billing-to').value;
  const studentFilter = document.getElementById('billing-student').value;
  const studentBill = {};

  Object.entries(data.orders || {}).sort().forEach(([date, dayOrders]) => {
    if ((from && date < from) || (to && date > to)) return;
    Object.entries(dayOrders).forEach(([s, items]) => {
      if (studentFilter && s !== studentFilter) return;
      if (!studentBill[s]) studentBill[s] = { unpaidTotal: 0, paidTotal: 0, canceledTotal: 0, days: [] };
      const pStatus = ((data.payments || {})[date] || {})[s] || 'unpaid';
      const rawSubtotal = items.reduce((acc,i) => acc + i.price*i.qty, 0);
      const displaySubtotal = pStatus === 'canceled' ? 0 : rawSubtotal;

      if (pStatus === 'unpaid') studentBill[s].unpaidTotal += rawSubtotal;
      else if (pStatus === 'paid') studentBill[s].paidTotal += rawSubtotal;
      else if (pStatus === 'canceled') studentBill[s].canceledTotal += rawSubtotal;

      studentBill[s].days.push({ date, items, displaySubtotal, status: pStatus });
    });
  });

  const names = Object.keys(studentBill);
  if (names.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">💰</div>這個區間內沒有任何訂單。</div>';
    return;
  }

  let html = '';
  names.forEach(name => {
    const bill = studentBill[name];
    html += `<div class="card"><div style="font-weight:900">${escapeHtml(name)} - 待付款合計 NT$${bill.unpaidTotal}</div>`;
    html += `<div style="font-size:0.78rem;color:var(--text-muted);margin:2px 0 10px;">已付款 NT$${bill.paidTotal} 已取消 NT$${bill.canceledTotal}</div>`;
    html += `<table class="stats-table"><thead><tr><th>日期</th><th>品項</th><th>小計</th><th>狀態</th></tr></thead><tbody>`;
    bill.days.forEach(day => {
      const pStatus = day.status;
      let statusHtml;
      if (state.adminUnlocked) {
        statusHtml = `<select class="status-select ${pStatus}" onchange="updatePayment('${day.date}','${escapeAttr(name)}',this.value)">
          <option value="unpaid" ${pStatus==='unpaid'?'selected':''}>待付款</option>
          <option value="paid" ${pStatus==='paid'?'selected':''}>已付款</option>
          <option value="canceled" ${pStatus==='canceled'?'selected':''}>取消</option>
        </select>`;
      } else {
        const badgeClass = pStatus === 'paid' ? 'badge-green' : pStatus === 'canceled' ? 'badge-red' : 'badge-gray';
        statusHtml = `<span class="badge ${badgeClass}">${STATUS_LABEL[pStatus] || '待付款'}</span>`;
      }
      html += `<tr><td>${day.date}</td><td>${day.items.map(i=>escapeHtml(i.name)+'(NT$'+i.price+')×'+i.qty).join('、')}</td><td>NT$${day.displaySubtotal}</td><td>${statusHtml}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });
  container.innerHTML = html;
}

async function updatePayment(date, student, status) {
  if (!state.adminUnlocked) { showToast('❌ 沒有權限變更狀態'); return; }
  
  const success = await mutateData((latest) => {
    if (!latest.payments[date]) latest.payments[date] = {};
    latest.payments[date][student] = status;
    pushLog(latest, '管理員', `修改付款狀態 (${student} 於 ${date} 改為 ${STATUS_LABEL[status] || status})`);
  });

  if (success) {
    showToast('✅ 狀態已更新');
    renderStats();
    renderLogsPanel(await getData());
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function exportCSV() {
  const data = await getData();
  const weekDays = ['日','一','二','三','四','五','六'];
  const rows = [['日期','星期','學生','品項','單價','數量','小計','狀態']];
  Object.keys(data.orders || {}).sort().forEach(date => {
    const wd = weekDays[new Date(date + 'T00:00:00').getDay()];
    Object.entries(data.orders[date]).forEach(([student, items]) => {
      const status = ((data.payments || {})[date] || {})[student] || 'unpaid';
      const statusLabel = STATUS_LABEL[status] || '待付款';
      if (items.length === 0) {
        rows.push([date, wd, student, '', '', '', '', statusLabel]);
      } else {
        items.forEach(it => {
          rows.push([date, wd, student, it.name, it.price, it.qty, it.price*it.qty, statusLabel]);
        });
      }
    });
  });
  const csv = '\uFEFF' + rows.map(r => r.map(csvCell).join(',')).join('\n');
  downloadFile(`福林64訂購明細_${getPreciseTimeStr()}.csv`, csv, 'text/csv;charset=utf-8;');
}

async function exportJSON() {
  const data = await getData();
  downloadFile(`福林64備份_${getPreciseTimeStr()}.json`, JSON.stringify(data, null, 2), 'application/json');
}

function importJSON() {
  document.getElementById('import-file').click();
}

async function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed.orders || !parsed.menus || !parsed.students) {
      showToast('❌ 檔案格式不正確');
      event.target.value = '';
      return;
    }
    if (!confirm('此操作將覆蓋目前所有資料（學生名單、菜單、訂單、付款狀態），確定要匯入嗎？\n\n系統會先為您自動下載一份覆蓋前備份。')) {
      event.target.value = '';
      return;
    }
    
    await autoBackup('匯入');

    const success = await mutateData((latest) => {
        const preservePassword = latest.password;
        const preserveLogs = latest.logs || []; 
        Object.keys(latest).forEach(k => delete latest[k]); 
        Object.assign(latest, parsed); 
        
        if (!latest.deadlines) latest.deadlines = {};
        if (!latest.opens) latest.opens = {};
        if (!latest.payments) latest.payments = {};
        if (!latest.password) latest.password = preservePassword;
        
        latest.logs = preserveLogs;
        pushLog(latest, '管理員', `匯入資料備份檔`);
    });

    if (success) {
        showToast('✅ 匯入成功');
        await renderDateGrid();
        await renderAdminPage();
    }
  } catch (e) {
    showToast('❌ 匯入失敗，請確認檔案格式');
  }
  event.target.value = '';
}

const CLEAR_CONFIRM_PHRASE = '清除訂單';

function showClearConfirm() {
  document.getElementById('clear-confirm-box').style.display = 'block';
  document.getElementById('clear-confirm-input').value = '';
  document.getElementById('clear-confirm-btn').disabled = true;
  document.getElementById('clear-trigger-btn').style.display = 'none';
}

function hideClearConfirm() {
  document.getElementById('clear-confirm-box').style.display = 'none';
  document.getElementById('clear-confirm-input').value = '';
  document.getElementById('clear-confirm-btn').disabled = true;
  document.getElementById('clear-trigger-btn').style.display = 'block';
}

function checkClearConfirmInput() {
  const val = document.getElementById('clear-confirm-input').value.trim();
  document.getElementById('clear-confirm-btn').disabled = (val !== CLEAR_CONFIRM_PHRASE);
}

async function clearAllData() {
  const val = document.getElementById('clear-confirm-input').value.trim();
  if (val !== CLEAR_CONFIRM_PHRASE) { showToast('❌ 請先輸入正確的確認文字'); return; }
  
  await autoBackup('清除');

  const success = await mutateData((latest) => {
    latest.orders = {};
    latest.payments = {};
    pushLog(latest, '管理員', `清除所有訂單與付款資料`);
  });

  if (success) {
    hideClearConfirm();
    showToast('✅ 已清除全部訂單資料');
    await renderDateGrid();
    renderLogsPanel(await getData());
  }
}

// ════════════════════════════════════════
//  後台管理：密碼 / 學生名單 / 菜單與截止時間 / 紀錄
// ════════════════════════════════════════
function unlockAdmin() {
  const pw = document.getElementById('admin-pw-input').value;
  if (pw === _cache.password) {
    state.adminUnlocked = true;
    document.getElementById('pw-error').textContent = '';
    document.getElementById('admin-pw-input').value = '';
    renderAdminPage();
  } else {
    document.getElementById('pw-error').textContent = '密碼錯誤';
  }
}

function lockAdmin() {
  state.adminUnlocked = false;
  document.getElementById('admin-locked').style.display = 'block';
  document.getElementById('admin-unlocked').style.display = 'none';
  hideClearConfirm();
  showToast('已離開後台');
}

async function changePassword() {
  const val = document.getElementById('new-pw').value;
  if (!val || val.length < 4) { showToast('❌ 密碼至少需要 4 個字元'); return; }
  
  const success = await mutateData((latest) => {
    latest.password = val;
    pushLog(latest, '管理員', `修改系統密碼`);
  });

  if (success) {
    document.getElementById('new-pw').value = '';
    showToast('✅ 密碼已更新');
    renderLogsPanel(await getData());
  }
}

async function renderAdminPage() {
  const data = await getData();
  if (!state.adminUnlocked) {
    document.getElementById('admin-locked').style.display = 'block';
    document.getElementById('admin-unlocked').style.display = 'none';
    return;
  }
  document.getElementById('admin-locked').style.display = 'none';
  document.getElementById('admin-unlocked').style.display = 'block';

  renderStudentListEdit(data);
  renderLogsPanel(data);

  const adminDateInput = document.getElementById('admin-date');
  if (!adminDateInput.value) {
    const dates = Object.keys(data.menus || {}).sort();
    const today = todayStr();
    adminDateInput.value = dates.find(d => d >= today) || dates[dates.length-1] || today;
  }
  adminDateInput.onchange = () => loadAdminMenuEditor(data);
  await loadAdminMenuEditor(data);
}

function renderLogsPanel(data) {
  const container = document.getElementById('admin-logs-container');
  if (!data.logs || data.logs.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:10px;">目前尚無操作紀錄</div>';
    return;
  }
  container.innerHTML = data.logs.map(log => `
    <div class="log-item">
      <span class="log-time">${escapeHtml(log.time)}</span>
      <span class="log-user">[${escapeHtml(log.user)}]</span>
      <span class="log-action">${escapeHtml(log.action)}</span>
    </div>
  `).join('');
}

function renderStudentListEdit(data) {
  const el = document.getElementById('student-list-edit');
  if (!data.students || data.students.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:10px 0"><div class="icon">🧑‍🎓</div>尚無學生，請於下方新增。</div>';
    return;
  }
  el.innerHTML = data.students.map(s => `
    <div class="menu-edit-row">
      <input type="text" value="${escapeAttr(s)}" disabled>
      <button class="del-btn" onclick="removeStudent('${escapeAttr(s)}')">✕</button>
    </div>
  `).join('');
}

async function addStudent() {
  const input = document.getElementById('new-student');
  const name = input.value.trim();
  if (!name) return;
  if (/\s/.test(name)) { showToast('❌ 姓名不能包含空白'); return; }
  
  let isDuplicate = false;
  
  const success = await mutateData((latest) => {
    if (latest.students.includes(name)) {
      isDuplicate = true;
      return false; // 沒有任何變化，通知 mutateData 不需要寫入雲端
    }
    latest.students.push(name);
    pushLog(latest, '管理員', `新增學生 (${name})`);
  });

  if (isDuplicate) { showToast('❌ 已存在這個名字'); return; }
  if (success) {
    input.value = '';
    const updatedData = await getData();
    renderStudentListEdit(updatedData);
    renderLogsPanel(updatedData);
    showToast('✅ 已新增學生');
  }
}

async function removeStudent(name) {
  if (!confirm(`確定要將「${name}」從名單移除嗎？過去的訂單紀錄仍會保留在統計中。`)) return;
  
  const success = await mutateData((latest) => {
    latest.students = latest.students.filter(s => s !== name);
    pushLog(latest, '管理員', `移除學生 (${name})`);
  });

  if (success) {
    const updatedData = await getData();
    renderStudentListEdit(updatedData);
    renderLogsPanel(updatedData);
    showToast('✅ 已移除學生');
  }
}

let adminMenuDraft = [];

async function loadAdminMenuEditor(data) {
  const dateKey = document.getElementById('admin-date').value;
  if (!dateKey) return;
  adminMenuDraft = (data.menus[dateKey] || []).map(it => ({ name: it.name, price: it.price }));
  populateHourSelects();
  setDateHourFields('admin-open-date', 'admin-open-hour', (data.opens || {})[dateKey], dateKey);
  setDateHourFields('admin-deadline-date', 'admin-deadline-hour', (data.deadlines || {})[dateKey], dateKey);
  renderAdminMenuRows();
}

function setDateHourFields(dateInputId, hourSelectId, isoStr, fallbackDate) {
  const dateInput = document.getElementById(dateInputId);
  const hourSelect = document.getElementById(hourSelectId);
  if (isoStr) {
    const [datePart, timePart] = isoStr.split('T');
    dateInput.value = datePart || fallbackDate || '';
    hourSelect.value = timePart ? timePart.split(':')[0] : '';
  } else {
    dateInput.value = fallbackDate || '';
    hourSelect.value = '';
  }
}

function buildDateHourValue(dateInputId, hourSelectId) {
  const dateVal = document.getElementById(dateInputId).value;
  const hourVal = document.getElementById(hourSelectId).value;
  if (!hourVal) return '';
  if (!dateVal) return '';
  return `${dateVal}T${hourVal}:00`;
}

function renderAdminMenuRows() {
  const el = document.getElementById('admin-menu-items');
  if (adminMenuDraft.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:8px 0"><div class="icon">🍽️</div>尚未新增品項。</div>';
    return;
  }
  el.innerHTML = adminMenuDraft.map((it, idx) => `
    <div class="menu-edit-row">
      <input type="text" value="${escapeAttr(it.name)}" placeholder="品項名稱" oninput="adminMenuDraft[${idx}].name=this.value">
      <input type="number" class="price" value="${it.price}" placeholder="價格" oninput="adminMenuDraft[${idx}].price=parseInt(this.value)||0">
      <button class="del-btn" onclick="removeMenuItem(${idx})">✕</button>
    </div>
  `).join('');
}

function addMenuItem() {
  adminMenuDraft.push({ name: '', price: 0 });
  renderAdminMenuRows();
}

function removeMenuItem(idx) {
  adminMenuDraft.splice(idx, 1);
  renderAdminMenuRows();
}

async function saveMenu() {
  const dateKey = document.getElementById('admin-date').value;
  if (!dateKey) { showToast('❌ 請先選擇日期'); return; }
  const cleaned = adminMenuDraft.filter(it => it.name && it.name.trim()).map(it => ({ name: it.name.trim(), price: parseInt(it.price) || 0 }));
  const deadlineVal = buildDateHourValue('admin-deadline-date', 'admin-deadline-hour');
  const openVal = buildDateHourValue('admin-open-date', 'admin-open-hour');

  const success = await mutateData((latest) => {
    const isNew = !latest.menus[dateKey] || latest.menus[dateKey].length === 0;
    
    latest.menus[dateKey] = cleaned;
    
    if (deadlineVal) latest.deadlines[dateKey] = deadlineVal;
    else delete latest.deadlines[dateKey];

    if (openVal) latest.opens[dateKey] = openVal;
    else delete latest.opens[dateKey];

    const actionText = isNew ? `新增日期與設定菜單 (${dateKey})` : `修改菜單/期限設定 (${dateKey})`;
    pushLog(latest, '管理員', actionText);
  });

  if (success) {
    showToast('✅ 菜單已儲存');
    await renderDateGrid();
    renderLogsPanel(await getData());
  }
}

renderDateGrid();
